# MSSP Configuration
# Multi-Scale Single-Step Probing for Deepfake Detection
# -----------------------------------------------------------
# This file provides default hyperparameters for MSSP experiments.
# Override values via command-line arguments in experiment scripts.

# Model configuration
model:
  image_size: 256
  model_path: ""   # Set to path of 256x256_diffusion_uncond.pt
  device: "cuda"
  use_fp16: true   # Enable on CUDA for memory efficiency

# MSSP probe configuration
mssp:
  # T_set from paper: {200, 400, 600, 800, 1000}
  # t=1000 is clipped to t=999 (ADM schedule is 0-999)
  probe_timesteps: [200, 400, 600, 800, 999]
  noise_seed: 42      # Fixed seed for deterministic noise generation
  n_freq_bands: 8     # Radial PSD bands per channel
  normalize_features: true

# Feature dimensions (auto-computed from above):
#   F_norm  = 5D  (1 per scale)
#   F_psd   = 120D (n_freq_bands=8 × 3 channels × 5 scales)
#   F_stat  = 60D  (4 moments × 3 channels × 5 scales)
#   Total   = 185D

# Data configuration
data:
  root: ""  # Set to dataset root path
  image_size: 256
  batch_size: 32
  num_workers: 4
  # MSSP expects images in [-1, 1] range (normalize_for_adm=True)
  normalize_for_adm: true

# Step B validation
step_b:
  num_samples: 200      # Images per category for validation
  batch_size: 4         # Small batch for memory efficiency
  output_dir: "./results/step_b_mssp"
  categories: ["Real", "ProGAN", "SD_v1.5", "Wukong"]

  # Test thresholds
  test1_ratio_threshold: 2.0   # ProGAN/Real high-freq ratio > 2.0
  test2_zscore_threshold: 2.0  # SD VAE z-score > 2.0
  test3_knn_threshold: 0.84    # k-NN accuracy >= 84% (DRIFT baseline)
  knn_k: 5
  knn_folds: 5

# Training (future use)
training:
  lr: 1e-4
  batch_size: 32
  num_epochs: 50
  optimizer: "adam"
  scheduler: "cosine"
  dropout: 0.1
  hidden_dim: 256    # Binary head hidden dimension

# Evaluation
evaluation:
  metrics: ["auc", "accuracy", "ap"]
  cross_generator_names:
    - "ProGAN"
    - "SD_v1.5"
    - "Wukong"
    - "DALL-E"
    - "Midjourney"

# Logging
logging:
  log_level: "INFO"
  log_dir: "./logs"
  log_filename: "mssp.log"
